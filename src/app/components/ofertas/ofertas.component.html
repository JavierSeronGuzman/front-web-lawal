<div class="container">
    <div class="d-none d-md-block">
    <div class="row justify-content-center">

            @for (anuncio of anuncios; track $index) {
                <div class="col-12 col-sm-6 col-md-4 col-lg-4 d-flex justify-content-center">
                    <img src="{{anuncio.img}}" class="img-fluid rounded" role="button"
                    [routerLink]="['/catalog']" 
                    style="width: 100%; max-width: 350px; height: auto;" alt="...">
                </div>
            }
        </div>
    </div> 
    <div class="d-block d-md-none">
      <div class="row justify-content-center">
          @for (anuncio of anuncios; track $index) {
              <div class="col-6 col-sm-4 col-md-3 d-flex justify-content-center mb-3">
                  <img src="{{anuncio.img}}" class="img-fluid rounded" role="button"
                  [routerLink]="['/catalog']" 
                  style="width: 100%; max-width: 150px; height: auto;" alt="...">
              </div>
          }
      </div>
