<div class="d-none d-lg-block">

  <nav class="navbar fixed-top" style="background-color: #2510a3; z-index: 1030;">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" style="color: #ffffff; margin-left: 20px;"
              data-bs-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent" 
              aria-expanded="false" aria-label="Toggle navigation">
              <i class="fa-solid fa-bars fa-lg" style="color: #ffffff;"></i>
      </button>
      <div class="col-2 d-flex align-items-center justify-content-center">
        <img src="logoblancoess.png" role="button" alt="Logo" style="width: 200px; height: 50px;"
             [routerLink]="['']" (click)="home()">
      </div>
      <div class="col-6 d-flex align-items-center justify-content-center">
        <div class="input-group w-100">
          <input type="text" class="form-control" placeholder="Buscar..." aria-label="Buscar"
                 aria-describedby="button-addon2" [(ngModel)]="searchTerm">
          <button class="btn btn-success" type="button" id="button-addon2" 
                  (click)="searchProducts()" 
                  [disabled]="!searchTerm.trim()"
                  [routerLink]="['/catalog']">
                  <i class="fa-solid fa-magnifying-glass" style="color: #ffffff;"></i>
          </button>
        </div>
      </div>
      <div class="col-3 d-flex align-items-center justify-content-center">
        <button class="icon-button" [routerLink]="['']" (click)="home()">
          <i class="fa-solid fa-home fa-lg" style="color: #f7f9fc;"></i>
        </button>
        <button class="icon-button mx-5 position-relative">
          <i class="fa-solid fa-cart-shopping fa-lg" style="color: #f7f7f7;" (click)="openCart()"></i>
          <span *ngIf="itemTotal >= 1" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            {{itemTotal}}
            <span class="visually-hidden">productos en el carro</span>
          </span>
        </button>
        <button class="icon-button" (click)="scrollMap()">
          <i class="fa-solid fa-location-dot fa-lg" style="color: #f2f2f2;"></i>
        </button>
      </div>
    </div>
  
    <!-- Colocar el contenido desplegable dentro del navbar -->
  <div class="collapse navbar-collapse" id="navbarToggleExternalContent" style="background-color: #2510a3;">
    <div class="p-1 w-100 mx-4">
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: #f7f7f7; font-weight: bold;">
            Categorías
          </a>
          <app-categorias></app-categorias>
        </li>
      </ul>
      <a class="nav-link nosotros" style="color: #f7f7f7; font-weight: bold;" role="button">Nosotros</a>
    </div>
  </div>
  </nav>
</div>


<div class="d-block d-lg-none">
  <nav class="navbar navbar-expand-lg fixed-top" style="background-color: #2510a3;">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" style="color: #ffffff;" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars fa-lg" style="color: #ffffff;"></i>
      </button>
      
      <a class="navbar-brand mx-auto" href="#" [routerLink]="['']" (click)="home()">
        <img src="logoblancoess.png" alt="Logo" style="width: 200px; height: 50px;">
      </a>
      
      <div class="d-flex align-items-center">
        <button class="icon-button mx-2 position-relative" (click)="openCart()">
          <i class="fa-solid fa-cart-shopping fa-lg" style="color: #f7f7f7;"></i>
          @if (itemTotal >= 1) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
              {{itemTotal}}
              <span class="visually-hidden">productos en el carro</span>
            </span>
          }
        </button>
        
        <button class="icon-button mx-3 position-relative" (click)="scrollMap()">
          <i class="fa-solid fa-location-dot fa-lg" style="color: #f2f2f2;"></i>
        </button>
      </div>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="col-12 d-flex align-items-center justify-content-center">
          <div class="input-group w-100">
            <input type="text" class="form-control" placeholder="Buscar..." aria-label="Buscar"
                   aria-describedby="button-addon2" [(ngModel)]="searchTerm">
            <button class="btn btn-success" type="button" id="button-addon2" 
                    (click)="searchProducts()" 
                    [disabled]="!searchTerm.trim()"
                    [routerLink]="['/catalog']">
                    <i class="fa-solid fa-magnifying-glass" style="color: #ffffff;"></i>
            </button>
          </div>
        </div>
        <ul class="navbar-nav">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: #f7f7f7; font-weight: bold;">
              Categorías
            </a>
            <app-categorias></app-categorias>
          </li>
        </ul>
        <a class="nav-link" style="color: #f7f7f7; font-weight: bold;" role="button">Nosotros</a>
      </div>
    </div>
  </nav>
</div>
