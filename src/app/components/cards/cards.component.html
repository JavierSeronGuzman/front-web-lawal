<div class="row">
    @for (product of products; track $index) {
        
        <div class="col-3">
            <div class="card carta my-2">
                <img src="{{product.imagen}}" class="card-img-top img" alt="...">
                <div class="car-body m-2">
                    <h5 class="card-title">{{product.name}}</h5>
                    <p class="card-text descripcion">{{product.description}}</p>
                    <p class="card-text price">${{formatPrice(product.price) }}
     
                    </p>
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-primary btn-custom-size"  (click)="onCloseCart()">Agregar al carrito</button>
                    </div>
                               
                 </div>
            </div>
        </div>
    }
</div>
