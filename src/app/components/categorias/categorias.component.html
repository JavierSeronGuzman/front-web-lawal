<div class="container">

  <ul class="dropdown-menu">
    <li class="dropend">
      <a class="dropdown-item" id="dropdownSubMenu" data-bs-toggle="dropdown" aria-expanded="false"
      [routerLink]="['/catalog']" (click)="sub('todo','todo')" style="font-weight: bold;" (click)="closeBar()">
        Todos los Productos
      </a>
    </li>
    @for (category of getCategoryKeys(); track $index) {
      <li class="dropend">
        <a [ngClass]="viewSub(category)? 'dropdown-item dropdown-toggle': 'dropdown-item'" id="dropdownSubMenu" data-bs-toggle="dropdown" aria-expanded="false" style="font-weight: bold;"
        [routerLink]="['/catalog']" (click)="sub(category,'todo')" (click)="closeBar()">
          {{category}}
        </a>
        @if(viewSub(category)){
          <ul class="dropdown-menu " aria-labelledby="dropdownSubMenu">
        @for (subcategory of getSubcategoryKeys(category); track $index) {
                <li><a class="dropdown-item" [routerLink]="['/catalog']" (click)="sub(category,subcategory)" (click)="closeBar()">{{subcategory}}</a></li>
              }
            </ul>
        }
      </li>
    }
  </ul>
</div>
